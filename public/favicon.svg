<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#7A5010"/>
      <stop offset="35%"  stop-color="#D4A020"/>
      <stop offset="50%"  stop-color="#F0C840"/>
      <stop offset="65%"  stop-color="#D4A020"/>
      <stop offset="100%" stop-color="#7A5010"/>
    </linearGradient>
    <linearGradient id="gv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F0C840" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#7A5010" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Warm dark background -->
  <rect width="100" height="100" fill="#0C0A07"/>

  <!-- Subtle top glow -->
  <rect width="100" height="48" fill="url(#gv)"/>

  <!-- Top gold accent line -->
  <rect x="0" y="0" width="100" height="2" fill="url(#g)"/>

  <!-- Thin outer border -->
  <rect x="0.5" y="0.5" width="99" height="99" fill="none" stroke="#D4A020" stroke-width="1" opacity="0.2"/>

  <!-- S — Suit -->
  <text
    x="50" y="46"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="44"
    font-weight="400"
    fill="url(#g)"
    text-anchor="middle"
    dominant-baseline="auto">S</text>

  <!-- Gold divider -->
  <line x1="22" y1="51" x2="78" y2="51" stroke="url(#g)" stroke-width="0.7" opacity="0.55"/>

  <!-- W — Wolf -->
  <text
    x="50" y="90"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="42"
    font-weight="400"
    fill="url(#g)"
    text-anchor="middle"
    dominant-baseline="auto">W</text>
</svg>
